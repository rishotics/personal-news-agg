name: Daily Edition

on:
  schedule:
    # 00:30 UTC = 06:00 IST
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      no_telegram:
        description: "Skip Telegram delivery"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-edition
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate edition
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          if [ "${{ inputs.no_telegram }}" = "true" ]; then
            python main.py --no-telegram
          else
            python main.py
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/index.html
          if git diff --staged --quiet; then
            echo "No changes to index.html; skipping commit"
          else
            git commit -m "daily edition"
            git push
          fi

      - name: Upload generated HTML as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edition-${{ github.run_id }}
          path: output/*.html
          retention-days: 14
